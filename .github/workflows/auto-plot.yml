name: auto-plot

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**/*.md'
      - '**/*.png'
      - '**/*.slurm'
      - '**/*.npy'
      - '**/*.npz'
      - '**/CITATION.*'
      - '.claude/**'

  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**/*.md'
      - '**/*.png'
      - '**/*.slurm'
      - '**/*.npy'
      - '**/*.npz'
      - '**/CITATION.*'
      - '.claude/**'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  generate-figures:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: |
          uv venv
          uv pip install numpy==2.1.3 matplotlib==3.10.0 scipy==1.15.3

      # Strongly recommended if you use matplotlib:
      - name: Force headless plotting backend
        run: |
          echo "MPLBACKEND=Agg" >> $GITHUB_ENV

      # Option A: run every script under a folder (e.g. plots/)
      - name: Run python scripts
        run: |
          uv run python --version

          cd compare_models
          uv run FI_comparing.py
          uv run plot.py

          cd ../adapt_dynamics
          uv run response.py
          uv run time_series.py

          cd ../check_perturbation
          uv run plot.py

          cd ../C0_alpha
          uv run plot.py

          cd ../vary_KM/
          uv run plot.py

          cd ../adaptation_time
          uv run plot.py

      # Optionally: verify output files were created (edit paths as needed)
      # - name: Check plot outputs exist
      #   run: |
      #     test -f outputs/figure1.png
      #     test -f outputs/figure2.pdf

      - name: Push to GitHub
        uses: EndBug/add-and-commit@v7.2.1
        with:
          branch: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          message: ":bento: Generate figures [bot] [skip ci]"
          add: "**/*.png"
          default_author: github_actions
